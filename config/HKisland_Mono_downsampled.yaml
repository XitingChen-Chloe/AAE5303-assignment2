%YAML:1.0

#--------------------------------------------------------------------------------------------
# Camera Parameters for HKisland Dataset - 4x Downsampled (612x512)
# Use with: Mono_Compressed vocab.txt HKisland_Mono_downsampled.yaml 4
#--------------------------------------------------------------------------------------------
File.version: "1.0"

Camera.type: "PinHole"

# Camera calibration - scaled for 4x downsampling (2448x2048 -> 612x512)
# fx, fy, cx, cy divided by 4; distortion coeffs unchanged (normalized coords)
Camera1.fx: 361.1075
Camera1.fy: 361.085
Camera1.cx: 294.875
Camera1.cy: 261.225

Camera1.k1: -0.0560
Camera1.k2: 0.1180
Camera1.p1: 0.00122
Camera1.p2: 0.00064
Camera1.k3: -0.0627

# Downsampled resolution (2448/4 x 2048/4)
Camera.width: 612
Camera.height: 512

# Camera frames per second 
Camera.fps: 10

# Color order of the images (0: BGR, 1: RGB. It is ignored if images are grayscale)
Camera.RGB: 1

#--------------------------------------------------------------------------------------------
# ORB Parameters (same as original, may reduce nFeatures for smaller images)
#--------------------------------------------------------------------------------------------

ORBextractor.nFeatures: 1500
ORBextractor.scaleFactor: 1.2
ORBextractor.nLevels: 8
ORBextractor.iniThFAST: 15
ORBextractor.minThFAST: 5

#--------------------------------------------------------------------------------------------
# Viewer Parameters
#--------------------------------------------------------------------------------------------
Viewer.KeyFrameSize: 0.05
Viewer.KeyFrameLineWidth: 1.0
Viewer.GraphLineWidth: 0.9
Viewer.PointSize: 2.0
Viewer.CameraSize: 0.08
Viewer.CameraLineWidth: 3.0
Viewer.ViewpointX: 0.0
Viewer.ViewpointY: -0.7
Viewer.ViewpointZ: -1.8
Viewer.ViewpointF: 500.0
Viewer.imageViewScale: 1.0
